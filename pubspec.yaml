name: appski
description: "Appski - Macedonian Community of Australia App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.6.2
  provider: ^6.1.2
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  intl: ^0.19.0
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.1
  carousel_slider: ^5.0.0
  flutter_staggered_grid_view: ^0.7.0
  shimmer: ^3.0.0
  table_calendar: ^3.1.3
  flutter_svg: ^2.0.16

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: AppIcons
      fonts:
        - asset: assets/fonts/AppIcons.ttf
