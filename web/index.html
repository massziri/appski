<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Appski - Macedonian Community of Australia">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Appski">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Appski - Macedonian Community of Australia</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #f2c65f; }
    body { font-family: 'Segoe UI', sans-serif; }
    .loading {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      background: #f2c65f;
    }
    .loading::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url('assets/assets/images/branding/appski_yellow_splash.jpg') center/cover no-repeat;
    }
    .loading::after {
      content: '';
      position: absolute;
      left: 50%;
      bottom: 26px;
      width: 180px;
      height: 4px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: rgba(122, 14, 36, 0.18);
      box-shadow: inset 0 0 0 1px rgba(122, 14, 36, 0.08);
    }
    .loading-bar {
      position: absolute;
      left: 50%;
      bottom: 26px;
      width: 64px;
      height: 4px;
      transform: translateX(-110px);
      border-radius: 999px;
      background: linear-gradient(90deg, #8e1630, #d85f22);
      animation: slide 1.2s ease-in-out infinite;
      z-index: 2;
    }
    @keyframes slide {
      0% { transform: translateX(-110px); }
      100% { transform: translateX(46px); }
    }
  </style>
</head>
<body>
  <div class="loading" id="loading"><div class="loading-bar"></div></div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
