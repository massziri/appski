<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Appski - MASO Connect</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; color: #fff; overflow: hidden; }
        
        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; pointer-events: none; } }
        @keyframes zoomKen { from { transform: scale(1); } to { transform: scale(1.15); } }
        @keyframes cardPop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        .fade-out { animation: fadeOut 0.5s ease-in forwards; }

        /* Screens */
        .screen { display: none; width: 100%; height: 100vh; position: relative; flex-direction: column; }
        .screen.active { display: flex; }

        /* ============ SPLASH SCREEN ============ */
        #splashScreen {
            background: #000;
            padding: 0; margin: 0;
            height: 100vh !important;
            min-height: unset !important;
            overflow: hidden;
        }
        #splashScreen img { width: 100%; height: 100vh; object-fit: cover; object-position: center; display: block; max-height: 100vh; }

        /* ============ AD SCREEN ============ */
        #adScreen {
            background: #000;
            padding: 0; margin: 0; cursor: pointer;
            height: 100vh !important;
            min-height: unset !important;
            overflow: hidden;
        }
        #adScreen img { width: 100%; height: 100vh; object-fit: cover; object-position: center; display: block; max-height: 100vh; }
        .ad-skip { position: fixed; bottom: 24px; right: 16px; z-index: 10; background: rgba(0,0,0,0.55); color: white; border: 1px solid rgba(255,255,255,0.4); border-radius: 20px; padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer; backdrop-filter: blur(4px); }

        /* ============ LOGIN SCREEN ============ */
        #loginScreen { position: relative; overflow: hidden; }
        .slideshow-bg { position: absolute; inset: 0; }
        .slideshow-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 1.5s ease-in-out; animation: zoomKen 12s ease-in-out infinite alternate; }
        .slideshow-img.active { opacity: 1; }
        .slideshow-overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.2) 40%, rgba(0,0,0,0.7) 100%); }
        .login-content { position: relative; z-index: 10; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
        .login-logo { width: 72px; height: 72px; border-radius: 18px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); margin-bottom: 16px; }
        .login-title { font-size: 36px; font-weight: 800; color: white; text-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        .login-subtitle { font-size: 16px; color: #D4A843; font-weight: 500; margin-top: 4px; text-shadow: 0 1px 4px rgba(0,0,0,0.3); }
        .login-desc { font-size: 14px; color: rgba(255,255,255,0.7); margin-top: 8px; }
        .login-welcome { font-size: 17px; color: rgba(255,255,255,0.9); margin: 24px 0; font-weight: 300; text-shadow: 0 1px 4px rgba(0,0,0,0.3); }

        .login-buttons { width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 12px; }
        .btn { width: 100%; padding: 14px 20px; border-radius: 14px; font-size: 15px; font-weight: 600; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.2s; }
        .btn-fb { background: #1877F2; color: white; }
        .btn-fb:hover { background: #1565C0; }
        .btn-appski { background: #8B1A1A; color: white; }
        .btn-appski:hover { background: #6B1515; }
        .btn-guest { background: rgba(255,255,255,0.15); color: white; backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.3); }
        .btn-guest:hover { background: rgba(255,255,255,0.25); }
        .btn-submit { background: #8B1A1A; color: white; }
        .btn-submit:hover { background: #6B1515; }
        .btn-back { background: transparent; color: #8B1A1A; font-size: 13px; padding: 8px; }

        .dots { display: flex; gap: 6px; margin-top: 24px; }
        .dot { width: 8px; height: 8px; border-radius: 4px; background: rgba(255,255,255,0.3); transition: all 0.3s; }
        .dot.active { background: #D4A843; width: 16px; }

        /* Login form */
        .login-form { width: 100%; max-width: 380px; background: rgba(255,255,255,0.95); backdrop-filter: blur(16px); border-radius: 20px; padding: 28px; box-shadow: 0 16px 48px rgba(0,0,0,0.2); display: none; }
        .login-form h2 { font-size: 20px; font-weight: 700; color: #8B1A1A; text-align: center; margin-bottom: 20px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 500; color: #555; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 12px; font-size: 15px; outline: none; color: #333; }
        .form-group input:focus { border-color: #8B1A1A; box-shadow: 0 0 0 3px rgba(139,26,26,0.1); }
        .form-error { color: #E74C3C; font-size: 13px; margin-bottom: 12px; display: none; }

        /* ============ 3D CUBE HOME SCREENS ============ */
        #homeScreen {
            perspective: 1200px;
            overflow: hidden;
        }

        .cube-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            transform-origin: center center;
        }

        .cube-face {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            transform-style: preserve-3d;
        }

        .cube-face.face1 {
            transform: rotateY(0deg) translateZ(0px);
        }

        .cube-face.face2 {
            transform: rotateY(90deg) translateZ(0px);
        }

        .cube-wrapper.rotate {
            transform: rotateY(-90deg);
        }

        /* ============ HOME SCREEN FACE 1 ============ */
        .home-face {
            background: linear-gradient(180deg, #8B8B8B 0%, #9B7B7B 30%, #A86B6B 60%, #8B4545 100%);
            padding: 0;
        }

        .home-header {
            padding: 16px;
            text-align: center;
            color: white;
            flex-shrink: 0;
        }

        .home-header h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
        .home-header p { font-size: 12px; opacity: 0.9; }

        .home-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 12px;
            flex: 1;
            max-height: calc(100vh - 80px);
            overflow: hidden;
        }

        .category-card {
            aspect-ratio: 1;
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 16px;
            background: rgba(255,255,255,0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            animation: cardPop 0.4s ease-out forwards;
            padding: 8px;
            user-select: none;
            min-height: 0;
        }

        .category-card:hover { transform: translateY(-2px); background: rgba(255,255,255,0.15); }
        .category-icon { font-size: 32px; margin-bottom: 6px; }
        .category-name { font-size: 10px; text-align: center; font-weight: 600; line-height: 1.1; }

        /* ============ HOME SCREEN FACE 2 ============ */
        .categories-face {
            background: linear-gradient(180deg, #7B7B7B 0%, #8B6B6B 30%, #986B6B 60%, #7B3535 100%);
            padding: 0;
        }

        .categories-header {
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            flex-shrink: 0;
        }

        .categories-header-icon { font-size: 24px; }
        .categories-header h1 { font-size: 18px; font-weight: 700; }

        .categories-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 12px;
            flex: 1;
            max-height: calc(100vh - 80px);
            overflow: hidden;
        }

        /* ============ DETAIL SCREEN ============ */
        #detailScreen { background: white; color: #333; }
        .detail-header { background: #8B1A1A; color: white; padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
        .back-btn { background: transparent; border: none; color: white; font-size: 20px; cursor: pointer; padding: 4px 8px; }
        .detail-content { flex: 1; overflow-y: auto; padding: 0; }
        .detail-section { margin-bottom: 0; padding: 0 16px 16px 16px; }
        .detail-section h3 { font-size: 18px; font-weight: 700; color: #333; margin-bottom: 16px; margin-top: 0; padding-bottom: 12px; border-bottom: 2px solid #f0f0f0; }
        .detail-item { padding: 12px; background: #f8f8f8; border-radius: 8px; margin-bottom: 8px; cursor: pointer; }
        .detail-item:hover { background: #f0f0f0; }

        /* Quiz */
        .quiz-container { padding: 16px; }
        .quiz-question { font-size: 16px; font-weight: 600; color: #333; margin-bottom: 16px; }
        .quiz-options { display: flex; flex-direction: column; gap: 8px; }
        .quiz-option { padding: 12px 16px; background: #f8f8f8; border: 2px solid transparent; border-radius: 8px; cursor: pointer; }
        .quiz-option:hover { background: #f0f0f0; }
        .quiz-option.selected { background: #8B1A1A; color: white; border-color: #6B1515; }

        /* Coming soon */
        .coming-soon { text-align: center; padding: 64px 20px; }
        .coming-soon .big-icon { font-size: 64px; }
        .coming-soon h3 { font-size: 22px; font-weight: 700; color: #8B1A1A; margin-top: 16px; }
        .coming-soon p { font-size: 14px; color: #999; margin-top: 8px; }

        /* Detail Screen Images */
        .detail-image { width: 100%; height: auto; max-height: 400px; object-fit: cover; border-radius: 0; margin-bottom: 0; margin-left: -16px; margin-right: -16px; margin-top: -16px; display: block; }
        .detail-list { list-style: none; padding: 0; margin-top: 16px; }
        .detail-list li { padding: 14px 16px; background: #f8f8f8; border-radius: 8px; margin-bottom: 8px; cursor: pointer; transition: all 0.2s; border-left: 4px solid #8B1A1A; }
        .detail-list li:hover { background: #f0f0f0; transform: translateX(4px); }
        .detail-list li a { color: #333; text-decoration: none; font-weight: 500; display: block; }
        .currency-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
        .currency-item { padding: 16px; background: #f8f8f8; border-radius: 8px; text-align: center; border: 2px solid #f0f0f0; }
        .currency-item .code { font-weight: 600; color: #8B1A1A; font-size: 18px; }
        .location-item { padding: 14px 16px; background: #f8f8f8; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid #8B1A1A; }
        .location-item .location-name { font-weight: 600; color: #333; margin-bottom: 4px; font-size: 16px; }
        .location-item .location-count { font-size: 13px; color: #999; }
        
        /* Functional Buttons */
        .channel-btn { display: block; width: 100%; padding: 16px; background: linear-gradient(135deg, #8B1A1A 0%, #6B1515 100%); color: white; border: none; border-radius: 8px; margin-bottom: 10px; cursor: pointer; font-size: 15px; font-weight: 600; transition: all 0.3s; text-align: left; box-shadow: 0 2px 8px rgba(139, 26, 26, 0.2); }
        .channel-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(139, 26, 26, 0.3); background: linear-gradient(135deg, #6B1515 0%, #4B0F0F 100%); }
        .channel-btn:active { transform: translateY(0); }
        
        .series-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
        .series-tile { padding: 16px; background: linear-gradient(135deg, #8B1A1A 0%, #6B1515 100%); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; text-align: center; transition: all 0.3s; box-shadow: 0 2px 8px rgba(139, 26, 26, 0.2); }
        .series-tile:hover { transform: scale(1.05); box-shadow: 0 4px 12px rgba(139, 26, 26, 0.3); }
        .series-tile:active { transform: scale(0.98); }
        
        .joke-btn { display: block; width: 100%; padding: 14px 16px; background: #f8f8f8; color: #333; border: 2px solid #e0e0e0; border-radius: 8px; margin-bottom: 10px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.3s; text-align: left; }
        .joke-btn:hover { background: #f0f0f0; border-color: #8B1A1A; transform: translateX(4px); }
        .joke-btn:active { background: #e8e8e8; }
        
        .expandable-btn { display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 14px 16px; background: #f8f8f8; color: #333; border: 2px solid #e0e0e0; border-radius: 8px; margin-bottom: 10px; cursor: pointer; font-size: 15px; font-weight: 600; transition: all 0.3s; }
        .expandable-btn:hover { background: #f0f0f0; border-color: #8B1A1A; }
        .expandable-btn.expanded { background: #e8e8e8; border-color: #8B1A1A; }
        .expandable-btn .arrow { font-size: 18px; transition: transform 0.3s; }
        .expandable-btn.expanded .arrow { transform: rotate(180deg); }
        
        .business-list { display: none; padding: 12px 0; }
        .business-list.show { display: block; }
        .business-item { padding: 10px 16px; background: #f5f5f5; border-left: 4px solid #8B1A1A; margin-bottom: 8px; border-radius: 4px; font-size: 13px; }
        
        .converter-input { width: 100%; padding: 14px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 15px; margin-bottom: 16px; box-sizing: border-box; }
        .converter-input:focus { outline: none; border-color: #8B1A1A; box-shadow: 0 0 0 3px rgba(139, 26, 26, 0.1); }

        /* Responsive */
        @media (min-width: 768px) {
            .home-grid { grid-template-columns: repeat(3, 1fr); max-width: 540px; margin: 0 auto; }
            .categories-grid { grid-template-columns: repeat(3, 1fr); max-width: 540px; margin: 0 auto; }
        }
    </style>
</head>
<body>
    <!-- ============ SPLASH SCREEN ============ -->
    <div id="splashScreen" class="screen active">
        <img src="splash.jpg" alt="Appski - MASO Connect">
    </div>

    <!-- ============ AD SCREEN ============ -->
    <div id="adScreen" class="screen" onclick="skipAd()">
        <img src="aria_ad.jpg" alt="Aria Band Sydney">
        <button class="ad-skip" onclick="skipAd()">Skip &rsaquo;</button>
    </div>

    <!-- ============ LOGIN SCREEN ============ -->
    <div id="loginScreen" class="screen">
        <div class="slideshow-bg">
            <img src="slideshow/mac1.jpg" class="slideshow-img active" alt="">
            <img src="slideshow/mac2.jpg" class="slideshow-img" alt="">
            <img src="slideshow/mac3.jpg" class="slideshow-img" alt="">
            <img src="slideshow/mac4.jpg" class="slideshow-img" alt="">
            <img src="slideshow/mac5.jpg" class="slideshow-img" alt="">
            <img src="slideshow/mac6.jpg" class="slideshow-img" alt="">
            <img src="slideshow/mac7.jpg" class="slideshow-img" alt="">
            <img src="slideshow/mac8.jpg" class="slideshow-img" alt="">
            <img src="slideshow/mac9.jpg" class="slideshow-img" alt="">
            <img src="slideshow/mac10.jpg" class="slideshow-img" alt="">
            <img src="slideshow/mac11.jpg" class="slideshow-img" alt="">
            <img src="slideshow/mac12.jpg" class="slideshow-img" alt="">
            <div class="slideshow-overlay"></div>
        </div>
        <div class="login-content">
            <img src="icon.png" alt="Appski" class="login-logo fade-in">
            <h1 class="login-title fade-in">Appski</h1>
            <p class="login-subtitle">MASO Connect</p>
            <p class="login-desc">Macedonian Australian Community</p>
            <p class="login-welcome">Добредојдовте! Welcome to the Macedonian community app.</p>

            <div id="loginButtons" class="login-buttons">
                <button class="btn btn-fb" onclick="loginFacebook()">
                    <svg width="18" height="18" fill="white" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                    Login with Facebook
                </button>
                <button class="btn btn-appski" onclick="showLoginForm()">
                    <img src="icon.png" width="18" height="18" style="border-radius:4px" alt="">
                    Login with Appski
                </button>
                <button class="btn btn-guest" onclick="loginGuest()">Continue without Login</button>
            </div>

            <div id="loginForm" class="login-form">
                <h2>Login with Appski</h2>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••">
                </div>
                <p class="form-error" id="loginError"></p>
                <button class="btn btn-submit" onclick="loginAppski()">Login</button>
                <button class="btn btn-back" onclick="hideLoginForm()">← Back to options</button>
            </div>

            <div class="dots" id="slideshowDots"></div>
        </div>
    </div>

    <!-- ============ HOME SCREENS WITH 3D CUBE ============ -->
    <div id="homeScreen" class="screen">
        <div class="cube-wrapper" id="cubeWrapper">
            <!-- FACE 1: First 9 Categories -->
            <div class="cube-face face1 home-face">
                <div class="home-header">
                    <h1>Welcome to Appski</h1>
                    <p>Connecting the Macedonian People</p>
                </div>
                <div class="home-grid" id="homeGrid"></div>
            </div>

            <!-- FACE 2: Second 8 Categories -->
            <div class="cube-face face2 categories-face">
                <div class="categories-header">
                    <div class="categories-header-icon">🔴</div>
                    <h1>Categories</h1>
                </div>
                <div class="categories-grid" id="categoriesGrid"></div>
            </div>
        </div>
    </div>

    <!-- ============ DETAIL SCREEN ============ -->
    <div id="detailScreen" class="screen">
        <header class="detail-header">
            <button class="back-btn" onclick="goBack()">←</button>
            <div>
                <div style="font-size: 16px; font-weight: 700;" id="detailTitle">Category</div>
            </div>
        </header>
        <div class="detail-content" id="detailContent"></div>
    </div>

    <script>
        let currentUser = null;
        let currentSlide = 0;
        let slideInterval = null;
        let adSkipped = false;
        let previousScreen = 'homeScreen';
        let cubeRotated = false;
        let touchStartX = 0;
        let touchEndX = 0;

        // ============ CATEGORIES DATA ============
        const HOME_CATEGORIES = [
            { id: 'businesses', name: 'Businesses', icon: '🏢' },
            { id: 'community', name: 'Community &\nOrganisations', icon: '👥' },
            { id: 'news', name: 'Latest News', icon: '📰' },
            { id: 'tv', name: 'Macedonian\nTV', icon: '📺' },
            { id: 'radios', name: 'Macedonian\nRadios', icon: '📻' },
            { id: 'series', name: 'Appski TV\nSeries', icon: '▶️' },
            { id: 'events', name: 'Events', icon: '📅' },
            { id: 'cooking', name: 'Cooking', icon: '🍳' },
            { id: 'tourism', name: 'Tourism\nMacedonia', icon: '🧭' }
        ];

        const CATEGORIES = [
            { id: 'orthodox', name: 'Orthodox\nCalendar', icon: '✝️' },
            { id: 'quiz', name: 'Quiz', icon: '❓' },
            { id: 'jokes', name: 'Jokes', icon: '😊' },
            { id: 'documents', name: 'Documents', icon: '📄' },
            { id: 'currency', name: 'Currency\nConverter', icon: '💱' },
            { id: 'weather', name: 'Weather', icon: '☀️' },
            { id: 'lyrics', name: 'Lyrics', icon: '🎵' },
            { id: 'giftshop', name: 'Gift shop', icon: '🎁' }
        ];

        // ============ INIT ============
        function init() {
            initSplash();
            renderHomeCategories();
            renderCategories();
            setupSlideshowDots();
            setupTouchControls();
        }

        // ============ SPLASH SCREEN ============
        function initSplash() {
            setTimeout(() => {
                showScreen('adScreen');
            }, 3000);
        }

        function skipAd() {
            if (adSkipped) return;
            adSkipped = true;
            showScreen('loginScreen');
        }

        setTimeout(() => {
            if (!adSkipped) skipAd();
        }, 8000);

        // ============ LOGIN SCREEN ============
        function setupSlideshowDots() {
            const dotsContainer = document.getElementById('slideshowDots');
            const slides = document.querySelectorAll('.slideshow-img');
            dotsContainer.innerHTML = '';
            slides.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = 'dot' + (i === 0 ? ' active' : '');
                dotsContainer.appendChild(dot);
            });
            startSlideshow();
        }

        function startSlideshow() {
            const slides = document.querySelectorAll('.slideshow-img');
            const dots = document.querySelectorAll('.dot');
            slideInterval = setInterval(() => {
                slides[currentSlide].classList.remove('active');
                dots[currentSlide].classList.remove('active');
                currentSlide = (currentSlide + 1) % slides.length;
                slides[currentSlide].classList.add('active');
                dots[currentSlide].classList.add('active');
            }, 5000);
        }

        function showLoginForm() {
            document.getElementById('loginButtons').style.display = 'none';
            document.getElementById('loginForm').style.display = 'flex';
            document.getElementById('loginForm').style.flexDirection = 'column';
        }

        function hideLoginForm() {
            document.getElementById('loginButtons').style.display = 'flex';
            document.getElementById('loginForm').style.display = 'none';
        }

        function loginGuest() {
            showScreen('homeScreen');
        }

        function loginFacebook() {
            alert('Facebook login coming soon!');
        }

        function loginAppski() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

        // ============ TOUCH/SWIPE CONTROLS ============
        function setupTouchControls() {
            const homeScreen = document.getElementById('homeScreen');
            homeScreen.addEventListener('touchstart', handleTouchStart, false);
            homeScreen.addEventListener('touchend', handleTouchEnd, false);
        }

        function handleTouchStart(e) {
            touchStartX = e.changedTouches[0].screenX;
        }

        function handleTouchEnd(e) {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }

        function handleSwipe() {
            const swipeThreshold = 50;
            const diff = touchStartX - touchEndX;

            if (Math.abs(diff) > swipeThreshold) {
                if (diff > 0) {
                    // Swiped left - rotate to show second face
                    rotateCubeToFace2();
                } else {
                    // Swiped right - rotate to show first face
                    rotateCubeToFace1();
                }
            }
        }

        function rotateCubeToFace2() {
            if (!cubeRotated) {
                const wrapper = document.getElementById('cubeWrapper');
                wrapper.classList.add('rotate');
                cubeRotated = true;
            }
        }

        function rotateCubeToFace1() {
            if (cubeRotated) {
                const wrapper = document.getElementById('cubeWrapper');
                wrapper.classList.remove('rotate');
                cubeRotated = false;
            }
        }

        // ============ CURRENCY CONVERTER ============
        function convertCurrency() {
            const mkdInput = document.getElementById('mkdInput');
            const amount = parseFloat(mkdInput.value) || 0;
            
            // Exchange rates (MKD to other currencies) - approximate rates
            const rates = {
                'AUD': 0.016,
                'CAD': 0.017,
                'EUR': 0.016,
                'GBP': 0.014,
                'USD': 0.017,
                'CHF': 0.015
            };
            
            Object.keys(rates).forEach(currency => {
                const value = (amount * rates[currency]).toFixed(2);
                const element = document.getElementById(currency.toLowerCase() + '-value');
                if (element) {
                    element.textContent = value;
                }
            });
        }
