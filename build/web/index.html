<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Appski - Macedonian Community of Australia">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Appski">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Appski - Macedonian Community of Australia</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #f2c65f; }
    body { font-family: 'Segoe UI', sans-serif; }
    .loading {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      background: #f2c65f;
    }
    .loading::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url('assets/assets/images/branding/appski_splash_new.png') center/cover no-repeat;
    }
    .loading::after {
      content: '';
      position: absolute;
      left: 50%;
      bottom: 26px;
      width: 180px;
      height: 4px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: rgba(122, 14, 36, 0.18);
      box-shadow: inset 0 0 0 1px rgba(122, 14, 36, 0.08);
    }
    .loading-bar {
      position: absolute;
      left: 50%;
      bottom: 26px;
      width: 64px;
      height: 4px;
      transform: translateX(-110px);
      border-radius: 999px;
      background: linear-gradient(90deg, #8e1630, #d85f22);
      animation: slide 1.2s ease-in-out infinite;
      z-index: 2;
    }
    @keyframes slide {
      0% { transform: translateX(-110px); }
      100% { transform: translateX(46px); }
    }
    /* Hide splash artwork for returning users */
    .loading.skip-splash::before { display: none; }
  </style>
  <script>
    // ── Splash: show only ONCE ──
    // On the web, Flutter SharedPreferences uses a key like:
    //   flutter.has_seen_splash  (in localStorage)
    // If user has seen the splash before, hide the splash artwork immediately
    // so they only see a brief gold screen while Flutter loads.
    (function() {
      try {
        var seen = localStorage.getItem('flutter.has_seen_splash');
        if (seen === 'true') {
          // Mark has_seen_splash so the Dart side also skips
          document.documentElement.classList.add('returning-user');
        }
      } catch(e) {}
    })();
  </script>
</head>
<body>
  <script>
    // Hide splash image for returning users (runs before paint)
    (function() {
      if (document.documentElement.classList.contains('returning-user')) {
        // Don't show splash image, just show blank gold background
        var style = document.createElement('style');
        style.textContent = '.loading::before { display: none !important; } .loading-bar { display: none !important; } .loading::after { display: none !important; }';
        document.head.appendChild(style);
      }
    })();
  </script>
  <div class="loading" id="loading"><div class="loading-bar"></div></div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
